<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WPF Production Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#fff;--border:#dde1e7;--b2:#c4c9d4;
  --text:#1a1d23;--t2:#4a5568;--t3:#8896aa;
  --green:#1a7a3c;--gl:#e6f4ec;--gb:#2d9e54;
  --red:#c0392b;--rl:#fdecea;
  --amber:#d97706;--al:#fef3c7;
  --blue:#1e4db7;--bl:#ebf0fb;
  --purple:#6d28d9;--pl:#f3effd;
  --accent:#c8a84b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,input,select{font-family:inherit;cursor:pointer}
.hdr{background:#1a1d23;color:#fff;border-bottom:3px solid var(--accent)}
.hdr-i{max-width:1400px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.lm{width:32px;height:32px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a1d23}
.lt{font-size:14px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#fff}
.ls{font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.sync{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#4caf50;display:inline-block}
.dot.s{background:var(--accent)}.dot.e{background:#e53935}
.tabs{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tabs-i{max-width:1400px;margin:0 auto;display:flex;padding:0 20px;overflow-x:auto}
.tabs-i::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 18px;border:none;background:none;font-size:13px;color:var(--t2);border-bottom:3px solid transparent;font-weight:500}
.tab:hover{color:var(--text)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.pg{max-width:1400px;margin:0 auto;padding:16px 20px 60px}
.cap-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:14px}
.cap-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:10px}
.week-caps{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}
.wk-cap{background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all .15s}
.wk-cap:hover{border-color:var(--b2)}.wk-cap.selected{border-color:var(--blue);background:var(--bl)}
.wk-label{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px}
.wk-date{font-size:10px;color:var(--t3);margin-bottom:5px}
.wk-bar-wrap{height:6px;background:#e5e8ed;border-radius:3px;overflow:hidden;margin-bottom:4px}
.wk-bar{height:100%;border-radius:3px;transition:width .3s}
.wk-bar.ok{background:var(--green)}.wk-bar.warn{background:var(--amber)}.wk-bar.over{background:var(--red)}
.wk-hours{font-size:11px;font-weight:600}
.wk-hours.ok{color:var(--green)}.wk-hours.warn{color:var(--amber)}.wk-hours.over{color:var(--red)}
.wk-count{font-size:10px;color:var(--t3)}
.board-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:13px;font-weight:500}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:var(--gb)}
.btn-s{background:#fff;border:1px solid var(--b2);color:var(--text)}.btn-s:hover{background:var(--bg)}
.btn-blue{background:var(--blue);color:#fff}
.search-input{padding:7px 12px;border:1px solid var(--b2);border-radius:6px;font-size:13px;min-width:200px;outline:none}
.search-input:focus{border-color:var(--blue)}
.filter-sel{padding:7px 10px;border:1px solid var(--b2);border-radius:6px;font-size:13px;background:#fff;outline:none;-webkit-appearance:none}
.wo-table-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.wo-table{width:100%;border-collapse:collapse;font-size:13px}
.wo-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);padding:8px 10px;border-bottom:1px solid var(--border);background:#f8f9fb;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
.wo-table th:hover{color:var(--text)}
.wo-table th.asc::after{content:' ↑'}.wo-table th.desc::after{content:' ↓'}
.wo-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.wo-table tr:last-child td{border-bottom:none}
.wo-table tr:hover td{background:#fafbfc}
.wo-table tr.dragging{opacity:.3}
.wo-table tr.drag-over td{border-top:3px solid var(--blue)}
.wo-table tr.c-red td:first-child{border-left:4px solid var(--red)}
.wo-table tr.c-amber td:first-child{border-left:4px solid var(--amber)}
.wo-table tr.c-green td:first-child{border-left:4px solid var(--green)}
.wo-table tr.c-blue td:first-child{border-left:4px solid var(--blue)}
.wo-table tr.c-purple td:first-child{border-left:4px solid var(--purple)}
.wo-num{font-family:monospace;font-size:11px;color:var(--t2)}
.wo-title{font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.wo-cust{color:var(--t2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.due-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.due-late{background:var(--rl);color:var(--red)}.due-soon{background:var(--al);color:var(--amber)}.due-ok{background:var(--gl);color:var(--green)}
.step-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bl);color:var(--blue);white-space:nowrap}
.week-sel{padding:4px 8px;border:1px solid var(--b2);border-radius:5px;font-size:12px;background:#fff;width:120px}
.notes-inp{width:100%;border:none;background:transparent;font-size:12px;color:var(--t2);padding:1px 0;outline:none;font-family:inherit;min-width:100px}
.notes-inp:focus{border-bottom:1px solid var(--blue)}
.cdot{width:13px;height:13px;border-radius:50%;display:inline-block;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cdot:hover{border-color:#fff;box-shadow:0 0 0 2px var(--b2)}
.drag-handle{cursor:grab;color:var(--t3);padding:0 3px;font-size:15px;user-select:none;line-height:1}
.drag-handle:active{cursor:grabbing}
.table-footer{padding:9px 12px;background:#f8f9fb;border-top:1px solid var(--border);display:flex;gap:20px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.changes-banner{background:var(--al);border:1px solid #f59e0b;border-radius:8px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.import-panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.drop-zone{border:2px dashed var(--b2);border-radius:8px;padding:28px;text-align:center;color:var(--t3);cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--blue);background:var(--bl);color:var(--blue)}
.preview-row{padding:5px 10px;background:var(--bg);border-radius:4px;margin-bottom:3px;display:flex;align-items:center;gap:10px;font-size:12px}
.exp-panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:9px 20px;border-radius:100px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:1000px){.week-caps{grid-template-columns:repeat(5,1fr)}}
@media(max-width:700px){.week-caps{grid-template-columns:repeat(3,1fr)}.wo-table th:nth-child(n+7),.wo-table td:nth-child(n+7){display:none}.pg{padding:12px 12px 60px}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-i">
  <div class="logo"><div class="lm">WP</div><div><div class="lt">Western Postform</div><div class="ls">Production Planner</div></div></div>
  <div class="sync"><span class="dot" id="dot"></span><span id="stxt">Loading…</span></div>
</div></div>
<div class="tabs"><div class="tabs-i">
  <button class="tab on" id="t-b">Capacity Board</button>
  <button class="tab" id="t-i">Import Work Orders</button>
  <button class="tab" id="t-x">Export Changes</button>
  <button class="tab" id="t-s">⚙ Settings</button>
</div></div>
<div id="app"><div style="padding:60px;text-align:center"><div class="spin"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const SUPA_URL='https://klyropbsupqfmtjjwlfa.supabase.co/rest/v1';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtseXJvcGJzdXBxZm10amp3bGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjY4MDEsImV4cCI6MjA5NDg0MjgwMX0.VuP5mnSgNhzoIdx7t3R7mgt2tyLZVtElUihei3xgC5Q';
const SUPA_HDR={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
const SUPA_WHDR={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const WCAP=350;

let DB={orders:[],nid:1,weekCaps:{}};
// Default value-to-hours scale (editable in Settings tab)
let HOUR_SCALE=[
  {maxVal:3000,  hours:3},
  {maxVal:6000,  hours:7},
  {maxVal:7000,  hours:9},
  {maxVal:8000,  hours:10},
  {maxVal:9000,  hours:11},
  {maxVal:10000, hours:12},
  {maxVal:12000, hours:14},
  {maxVal:15000, hours:16},
  {maxVal:20000, hours:20},
  {maxVal:30000, hours:26},
  {maxVal:999999,hours:32},
];
function estimateHours(value){
  const v=parseFloat(value)||0;
  if(v===0)return 1;
  const tier=HOUR_SCALE.find(t=>v<=t.maxVal);
  return tier?tier.hours:32;
}
let orig={};
let tab='b',sortCol='dueDate',sortDir=1,fWeek='',fCust='',srch='';
let saveT=null,dragSrc=null;

async function loadDB(){
  try{
    const r=await fetch(SUPA_URL+'/production_planner?id=eq.main',{headers:SUPA_HDR});
    const d=await r.json();
    if(d&&d[0]){
      if(d[0].orders)DB.orders=d[0].orders;
      if(d[0].nid)DB.nid=d[0].nid;
      if(d[0].settings&&d[0].settings.weekCaps)DB.weekCaps=d[0].settings.weekCaps||{};
    }
    DB.orders.forEach(o=>{orig[o.wo]=o.plannedWeek||'';});
  }catch(e){setSS('e');}
  setSS('ok');
}
async function saveDB(){
  setSS('s');
  try{
    await fetch(SUPA_URL+'/production_planner?id=eq.main',{method:'PATCH',headers:SUPA_WHDR,body:JSON.stringify({orders:DB.orders,nid:DB.nid,settings:{weekCaps:DB.weekCaps||{}}})});
    setSS('ok');
  }catch(e){setSS('e');}
}
function sched(){clearTimeout(saveT);saveT=setTimeout(saveDB,1200);}
function setSS(st){const d=document.getElementById('dot'),t=document.getElementById('stxt');if(!d)return;d.className='dot'+(st==='s'?' s':st==='e'?' e':'');t.textContent=st==='s'?'Saving…':st==='e'?'Save failed':'Synced';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2500);}
function fmt(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'2-digit'});}
function getMonday(d){
  const dt=new Date(d);
  // Use UTC day to avoid timezone issues
  const day=dt.getUTCDay();
  const diff=dt.getUTCDate()-day+(day===0?-6:1);
  return new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),diff));
}
function wkKey(d){
  const m=getMonday(d);
  return m.getUTCFullYear()+'-'+String(m.getUTCMonth()+1).padStart(2,'0')+'-'+String(m.getUTCDate()).padStart(2,'0');
}
function wkNum(d){const dt=new Date(d);const s=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil(((dt-s)/86400000+((s.getUTCDay()||7))+1)/7);}
function wkLbl(k){if(!k)return'—';const d=new Date(k);return'Wk '+wkNum(d)+' · '+d.toLocaleDateString('en-IE',{day:'numeric',month:'short'});}
function get8Wks(){const w=[];let d=getMonday(new Date());for(let i=0;i<8;i++){w.push(wkKey(d));d=new Date(d);d.setDate(d.getDate()+7);}return w;}
function wkCap(k){return DB.weekCaps&&DB.weekCaps[k]?DB.weekCaps[k]:WCAP;}
function wkHrs(k){return DB.orders.filter(o=>o.plannedWeek===k).reduce((a,o)=>a+o.hours,0);}
function wkVal(k){return DB.orders.filter(o=>o.plannedWeek===k).reduce((a,o)=>a+(o.value||0),0);}
function wkCnt(k){return DB.orders.filter(o=>o.plannedWeek===k).length;}
const VCAP=250000;
function fmtVal(v){return'€'+Math.round(v/1000)+'k';}
function dueBadge(due,pw,origDue){
  if(!due)return'<span class="due-badge due-ok">—</span>';
  const d=new Date(due),now=new Date(),diff=(d-now)/86400000;
  const wk='Wk'+wkNum(d);
  const origStr=origDue&&origDue!==due?` <span style="font-size:10px;color:var(--t3)">(orig: ${fmt(origDue)} Wk${wkNum(new Date(origDue))})</span>`:'';
  const label=`${fmt(due)} ${wk}`;
  if(pw){const pe=new Date(pw);pe.setDate(pe.getDate()+4);if(pe>d)return`<span class="due-badge due-late">${label}</span>${origStr}`;}
  if(diff<0)return`<span class="due-badge due-late">OVERDUE ${label}</span>${origStr}`;
  if(diff<14)return`<span class="due-badge due-soon">${label}</span>${origStr}`;
  return`<span class="due-badge due-ok">${label}</span>${origStr}`;
}
function changes(){return DB.orders.filter(o=>orig[o.wo]!==undefined&&orig[o.wo]!==(o.plannedWeek||''));}

function showTab(t){tab=t;['b','i','x'].forEach(id=>{const el=document.getElementById('t-'+id);if(el)el.className='tab'+(id===t?' on':'');});render();}

function render(){
  const app=document.getElementById('app');
  if(tab==='b')renderBoard(app);
  else if(tab==='i')renderImport(app);
  else if(tab==='x')renderExport(app);
  else renderSettings(app);
}

function renderSettings(app){
  const scaleRows=HOUR_SCALE.map((tier,i)=>{
    const prevVal=i===0?'Up to':'&euro;'+HOUR_SCALE[i-1].maxVal.toLocaleString()+' &mdash; ';
    const maxNote=i===HOUR_SCALE.length-1?' (max)':'';
    return '<tr>'
      +'<td style="padding:5px 12px;border-bottom:1px solid var(--border)">'+prevVal
      +' <input type="number" id="hs-v-'+i+'" value="'+tier.maxVal+'" step="500" min="0" style="width:90px;padding:3px 6px;border:1px solid var(--b2);border-radius:4px;font-size:13px">'+maxNote+'</td>'
      +'<td style="padding:5px 12px;border-bottom:1px solid var(--border)">'
      +'<input type="number" id="hs-h-'+i+'" value="'+tier.hours+'" step="0.5" min="1" style="width:70px;padding:3px 6px;border:1px solid var(--b2);border-radius:4px;font-size:13px"> hours</td>'
      +'</tr>';
  }).join('');

  app.innerHTML='<div class="pg">'
    +'<div class="exp-panel">'
    +'<div style="font-size:14px;font-weight:600;margin-bottom:6px">Value &rarr; Assembly Hours Scale</div>'
    +'<p style="font-size:12px;color:var(--t3);margin-bottom:14px">When Cienapps hours field is zero, hours are estimated from order value. Edit thresholds and click Save. Applies to next import only.</p>'
    +'<table style="border-collapse:collapse;font-size:13px;margin-bottom:14px">'
    +'<thead><tr>'
    +'<th style="padding:6px 12px;border-bottom:1px solid var(--border);text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)">Order Value Up To</th>'
    +'<th style="padding:6px 12px;border-bottom:1px solid var(--border);text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3)">Assembly Hours</th>'
    +'</tr></thead><tbody>'+scaleRows+'</tbody></table>'
    +'<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'
    +'<button class="btn btn-g" id="btn-save-scale">Save Scale</button>'
    +'<button class="btn btn-s" id="btn-reestimate">Re-estimate all estimated orders</button>'
    +'<span style="font-size:12px;color:var(--t3)">Amber hours = estimated from value</span>'
    +'</div></div>'
    +'<div class="exp-panel">'
    +'<div style="font-size:14px;font-weight:600;margin-bottom:6px">Capacity Settings</div>'
    +'<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px">'
    +'<div><label style="font-size:12px;color:var(--t2);display:block;margin-bottom:4px">Weekly Assembly Hours</label>'
    +'<input type="number" id="s-wcap" value="'+WCAP+'" step="10" min="1" style="padding:6px 10px;border:1px solid var(--b2);border-radius:6px;font-size:14px;width:120px"></div>'
    +'<div><label style="font-size:12px;color:var(--t2);display:block;margin-bottom:4px">Weekly Value Capacity (&euro;)</label>'
    +'<input type="number" id="s-vcap" value="'+VCAP+'" step="10000" min="1" style="padding:6px 10px;border:1px solid var(--b2);border-radius:6px;font-size:14px;width:140px"></div>'
    +'</div>'
    +'<button class="btn btn-g" id="btn-save-cap">Save Capacity</button>'
    +'</div></div>';

  document.getElementById('btn-save-scale')?.addEventListener('click',()=>{
    HOUR_SCALE.forEach((tier,i)=>{
      tier.maxVal=parseFloat(document.getElementById('hs-v-'+i)?.value)||tier.maxVal;
      tier.hours=parseFloat(document.getElementById('hs-h-'+i)?.value)||tier.hours;
    });
    toast('Scale saved ✓ — applies to next import');
  });

  document.getElementById('btn-reestimate')?.addEventListener('click',()=>{
    let count=0;
    DB.orders.forEach(o=>{if(o.hoursEstimated){o.hours=estimateHours(o.value);count++;}});
    sched();toast(count+' orders re-estimated');render();
  });

  document.getElementById('btn-save-cap')?.addEventListener('click',()=>{
    const newWcap=parseFloat(document.getElementById('s-wcap')?.value);
    const newVcap=parseFloat(document.getElementById('s-vcap')?.value);
    if(newWcap>0)Object.defineProperty(window,'WCAP',{value:newWcap,writable:true,configurable:true});
    if(newVcap>0)Object.defineProperty(window,'VCAP',{value:newVcap,writable:true,configurable:true});
    toast('Capacity updated ✓');
  });
}

function renderBoard(app){
  const weeks=get8Wks();
  const custs=[...new Set(DB.orders.map(o=>o.customer))].sort();
  const chg=changes();

  let orders=[...DB.orders];
  if(fWeek==='unscheduled')orders=orders.filter(o=>!o.plannedWeek);
  else if(fWeek)orders=orders.filter(o=>o.plannedWeek===fWeek);
  if(fCust)orders=orders.filter(o=>o.customer===fCust);
  if(srch){const q=srch.toLowerCase();orders=orders.filter(o=>o.title.toLowerCase().includes(q)||o.wo.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q));}
  orders.sort((a,b)=>{let av=a[sortCol]||'',bv=b[sortCol]||'';if(sortCol==='hours'||sortCol==='value'){av=+av;bv=+bv;}return av<bv?-sortDir:av>bv?sortDir:0;});

  const unschHrs=DB.orders.filter(o=>!o.plannedWeek).reduce((a,o)=>a+o.hours,0);
  const unschCnt=DB.orders.filter(o=>!o.plannedWeek).length;

  app.innerHTML=`<div class="pg">
  ${chg.length>0?`<div class="changes-banner">
    <strong>⚠ ${chg.length} work order${chg.length!==1?'s':''} rescheduled this session.</strong>
    <span style="font-size:12px;color:var(--amber)">Remember to export and update Cienapps.</span>
    <button class="btn btn-s" style="padding:4px 10px;font-size:12px;margin-left:auto" onclick="showTab('x')">Export Changes →</button>
  </div>`:''}

  <div class="cap-bar">
    <div class="cap-title">8-Week Assembly Capacity — ${WCAP}h per week</div>
    <div class="week-caps">
      ${weeks.map(wk=>{
        const h=wkHrs(wk),cnt=wkCnt(wk),v=wkVal(wk),cap=wkCap(wk);
        const pct=Math.min(100,Math.round(h/cap*100));
        const vpct=Math.min(100,Math.round(v/VCAP*100));
        const cls=pct>=100?'over':pct>=80?'warn':'ok';
        const vcls=vpct>=100?'over':vpct>=80?'warn':'ok';
        return`<div class="wk-cap${fWeek===wk?' selected':''}" data-wk="${wk}">
          <div class="wk-label">${wkLbl(wk)}</div>

  // Bind events
  document.querySelectorAll('[data-wk]').forEach(el=>el.onclick=()=>{fWeek=fWeek===el.dataset.wk?'':el.dataset.wk;render();});

  document.querySelectorAll('[data-hi]').forEach(inp=>inp.onchange=function(){const o=DB.orders.find(x=>x.wo===this.dataset.hi);if(o){o.hours=parseFloat(this.value)||0;o.hoursEstimated=false;sched();render();}});
  document.querySelectorAll('[data-dc]').forEach(dot=>dot.onclick=()=>{const o=DB.orders.find(x=>x.wo===dot.dataset.dc);if(o){o.colour=dot.dataset.cv;sched();render();}});
  document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>{
    if(!confirm('Delete '+btn.dataset.del+' from the planner?'))return;
    DB.orders=DB.orders.filter(o=>o.wo!==btn.dataset.del);
    delete orig[btn.dataset.del];
    sched();render();toast('Order removed');
  });
  // Drag & drop to swap weeks
  const tbody=document.getElementById('tbody');
  if(tbody){
    tbody.querySelectorAll('tr[draggable]').forEach(row=>{
      row.ondragstart=e=>{dragSrc=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
      row.ondragend=()=>{row.classList.remove('dragging');tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));};
      row.ondragover=e=>{e.preventDefault();row.classList.add('drag-over');};
      row.ondragleave=()=>row.classList.remove('drag-over');
      row.ondrop=e=>{
        e.preventDefault();row.classList.remove('drag-over');
        if(dragSrc&&dragSrc!==row){
          const a=DB.orders.find(o=>o.wo===dragSrc.dataset.wo),b=DB.orders.find(o=>o.wo===row.dataset.wo);
          if(a&&b){[a.plannedWeek,b.plannedWeek]=[b.plannedWeek,a.plannedWeek];sched();render();toast('Swapped: '+a.wo+' ↔ '+b.wo);}
        }
      };
    });
  }

function autoSchedule(newOrders){
  const weeks=get8Wks();
  const currentWeek=weeks[0];
  const wkLoad={};
  DB.orders.forEach(o=>{if(o.plannedWeek)wkLoad[o.plannedWeek]=(wkLoad[o.plannedWeek]||0)+o.hours;});
  newOrders.forEach(o=>{if(o.plannedWeek)wkLoad[o.plannedWeek]=(wkLoad[o.plannedWeek]||0)+o.hours;});
  newOrders.sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  newOrders.forEach(o=>{
    if(o.plannedWeek)return;
    let assigned=null;
    if(!o.dueDate){
      assigned=currentWeek;
    } else {
      const due=o.dueDate;
      if(due<currentWeek){
        // Overdue — put in current week
        assigned=currentWeek;
      } else {
        // Match to the exact week the due date falls in
        for(let i=0;i<weeks.length;i++){
          const wkStart=weeks[i];
          const wkEnd=i<weeks.length-1?weeks[i+1]:null;
          if(due>=wkStart&&(!wkEnd||due<wkEnd)){assigned=wkStart;break;}
        }
        if(!assigned)assigned=weeks[weeks.length-1];
      }
    }
    o.plannedWeek=assigned;
    wkLoad[assigned]=(wkLoad[assigned]||0)+o.hours;
  });
}

function doImport(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    let added=0,updated=0,skipped=0;
    const prev=[];
    const newOrders=[];

    rows.forEach(row=>{
      const wo=String(row['# WO']||'').trim();if(!wo||wo==='NaT'||wo==='nan'||wo==='undefined')return;
      const rawHours=parseFloat(row['Hours assembly time ']||row['To process']||row['Hours']||0);
      const rowVal=parseFloat(row['Sub-total']||0);
      // Hours rules: WO-S, WO-BI, WO-PF prefixes and zero value all get 1h
      let hours, hoursEstimated;
      if(wo.startsWith('WO-S-')||wo.startsWith('WO-BI-')||wo.startsWith('WO-PF-')||rowVal===0){
        hours=1; hoursEstimated=false;
      } else if(rawHours>0){
        hours=rawHours; hoursEstimated=false;
      } else {
        hours=estimateHours(rowVal); hoursEstimated=true;
      }
      let dueDate='';
      const rd=row['Due Date'];
      if(rd){try{
        if(typeof rd==='number'){
          // Excel serial date
          const d=new Date(Math.round((rd-25569)*86400*1000));
          dueDate=d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
        } else if(rd instanceof Date){
          // XLSX Date object — use UTC to avoid timezone shift
          dueDate=rd.getUTCFullYear()+'-'+String(rd.getUTCMonth()+1).padStart(2,'0')+'-'+String(rd.getUTCDate()).padStart(2,'0');
        } else if(typeof rd==='string'&&rd.match(/^\d{4}-\d{2}-\d{2}/)){
          // Already a YYYY-MM-DD string
          dueDate=rd.substring(0,10);
        } else {
          // Try parsing as date using UTC
          const parsed=new Date(rd);
          if(!isNaN(parsed))dueDate=parsed.getUTCFullYear()+'-'+String(parsed.getUTCMonth()+1).padStart(2,'0')+'-'+String(parsed.getUTCDate()).padStart(2,'0');
        }
      }catch(ex){}}
      // Skip if WO already exists (prevent duplicates)
      const ex=DB.orders.find(o=>o.wo===wo);
      if(ex){
        if(ex.hours!==hours||ex.dueDate!==dueDate){
          if(!ex.origDueDate)ex.origDueDate=ex.dueDate;
          ex.hours=hours;ex.dueDate=dueDate;ex.step=String(row['Step']||ex.step);
          updated++;prev.push({wo,status:'updated',title:ex.title,hours,dueDate,pw:ex.plannedWeek});
        } else skipped++;
      } else {
        const newO={wo,ref:String(row['Reference']||''),title:String(row['Title']||row['Reference']||wo),customer:String(row['Customer']||''),hours,hoursEstimated,dueDate,origDueDate:dueDate,step:String(row['Step']||''),salesRep:String(row['Sales Rep']||''),orderNo:String(row['Order #']||''),value:parseFloat(row['Sub-total']||0),plannedWeek:'',notes:'',colour:''};
        newOrders.push(newO);
        if(orig[wo]===undefined)orig[wo]='';
        added++;
      }
    });

    // Auto-schedule new orders
    autoSchedule(newOrders);
    newOrders.forEach(o=>{
      DB.orders.push(o);
      orig[o.wo]=o.plannedWeek||''; // set baseline AFTER auto-schedule so auto-assignments don't show as changes
      prev.push({wo:o.wo,status:'new',title:o.title,hours:o.hours,dueDate:o.dueDate,pw:o.plannedWeek});
    });

    sched();
    document.getElementById('iprev').innerHTML=`<div style="margin-top:14px">
      <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px">
        ✓ Import complete: ${added} added · ${updated} updated · ${skipped} unchanged
      </div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:8px">New orders auto-scheduled based on due date and available capacity.</div>
      ${prev.slice(0,15).map(p=>`<div class="preview-row">
        <span style="font-family:monospace;color:var(--t2);width:130px;flex-shrink:0">${p.wo}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</span>
        <span style="color:var(--t3);width:40px;text-align:right">${p.hours}h</span>
        <span style="color:var(--t3);font-size:11px;width:100px;text-align:right">${p.pw?wkLbl(p.pw):'—'}</span>
        <span style="padding:1px 7px;border-radius:3px;font-size:11px;background:${p.status==='new'?'var(--gl)':'var(--al)'};color:${p.status==='new'?'var(--green)':'var(--amber)'};">${p.status}</span>
      </div>`).join('')}
      ${prev.length>15?`<div style="font-size:12px;color:var(--t3);padding:6px 10px">...and ${prev.length-15} more</div>`:''}
      <button class="btn btn-g" style="margin-top:14px" onclick="showTab('b')">Go to Capacity Board →</button>
    </div>`;
    toast(`${added} added (auto-scheduled), ${updated} updated`);
  };
  reader.readAsBinaryString(file);
}

  });
  document.getElementById('btn-mark')?.addEventListener('click',()=>{DB.orders.forEach(o=>{orig[o.wo]=o.plannedWeek||'';});toast('Change tracker reset');render();});
  document.getElementById('btn-xfull')?.addEventListener('click',()=>{
    const weeks=get8Wks();
    const wb=XLSX.utils.book_new();
    const sorted=[...DB.orders].sort((a,b)=>{if(!a.plannedWeek&&b.plannedWeek)return 1;if(a.plannedWeek&&!b.plannedWeek)return-1;return(a.plannedWeek||'').localeCompare(b.plannedWeek||'');});
    const rows=[['WO #','Title','Customer','Hours','Planned Week','Week Start','Due Date','Step','Sales Rep','Notes'],
      ...sorted.map(o=>[o.wo,o.title,o.customer,o.hours,wkLbl(o.plannedWeek)||'Unscheduled',o.plannedWeek||'',o.dueDate||'',o.step.replace(/^\d\.\s*/,''),o.salesRep||'',o.notes||''])];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:16},{wch:35},{wch:28},{wch:7},{wch:16},{wch:13},{wch:12},{wch:20},{wch:16},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws,'Full Schedule');
    const srows=[['Week','Start Date','Orders','Hours','Capacity','% Used','Status'],...weeks.map(wk=>{const h=wkHrs(wk),cnt=wkCnt(wk),pct=Math.round(h/WCAP*100);return[wkLbl(wk),wk,cnt,h,WCAP,pct+'%',pct>=100?'OVER':pct>=80?'NEAR OK':'OK'];})];
    const ws2=XLSX.utils.aoa_to_sheet(srows);ws2['!cols']=[{wch:16},{wch:13},{wch:8},{wch:8},{wch:10},{wch:8},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,'Week Summary');
    XLSX.writeFile(wb,'WPF_Schedule_'+new Date().toISOString().split('T')[0]+'.xlsx');
    toast('Full schedule exported ✓');
  });
}

['b','i','x','s'].forEach(t=>{document.getElementById('t-'+t).onclick=()=>showTab(t);});
loadDB().then(()=>render());
</script>
</body>
